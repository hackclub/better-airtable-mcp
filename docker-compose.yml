services:
  postgres:
    image: postgres:16-alpine
    container_name: better-airtable-mcp-postgres
    environment:
      POSTGRES_DB: better_airtable_mcp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54329:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d better_airtable_mcp"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/better_airtable_mcp?sslmode=disable
      DUCKDB_DATA_DIR: /data/duckdb
    ports:
      - "8080:8080"
    volumes:
      - .:/src
      - go_modules:/root/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
      - node_modules:/src/frontend/node_modules
      - ./data:/data

volumes:
  postgres_data:
  go_modules:
  go_build_cache:
  node_modules:
