services:
  postgres:
    image: postgres:16-alpine
    container_name: better-airtable-mcp-postgres
    environment:
      POSTGRES_DB: better_airtable_mcp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54329:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d better_airtable_mcp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
